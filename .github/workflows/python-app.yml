name: Python application

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: "nadoutti"
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: nadoutti/ai-zambao:${{ github.sha }}
        
    - name: executing remote ssh commands using password
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST_TEST }}
        username: "ubuntu"
        key: ${{ secrets.KEY_TEST }}
        port: 22
        script: |
          sudo docker stop ai-zambao || true
          sudo docker rm -f ai-zambao || true
          sudo docker pull nadoutti/ai-zambao:${{ github.sha }}
          sudo docker run -d --name ai-zambao --network=rede -p 8081:5000 nadoutti/ai-zambao:${{ github.sha }}
